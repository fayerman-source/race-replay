<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Replay: 800m Visualization</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; min-height: 100vh; overflow-y: auto; }

        /* Layout Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: minmax(760px, 1.3fr) 330px;
            gap: 1.25rem;
            min-height: 100vh; /* Allow growing */
            padding: 1rem;
        }

        /* Track Container */
        .track-wrapper {
            background-color: #1E293B;
            border-radius: 12px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            min-height: 920px; /* Ensure space for track */
        }

        .oval-track {
            position: relative;
            width: 350px;
            height: 550px;
            transform-origin: center;
            transform: scale(1.55);
        }

        /* SVG Styling - Armory Blue Mondo Track */
        .track-surface {
            fill: #1E3A8A; /* Armory Blue */
            stroke: rgba(255,255,255,0.9);
            stroke-width: 3px;
        }
        .track-infield {
            fill: #1E293B; /* Match container bg */
        }
        .lane-line {
            stroke: rgba(255,255,255,0.4);
            stroke-width: 1px;
            stroke-dasharray: 8 4;
        }
        .start-finish-line {
            stroke: white;
            stroke-width: 5px;
        }
        .break-line {
            stroke: #22C55E; /* Green breakline */
            stroke-width: 3px;
            stroke-dasharray: none;
        }
        .split-line {
            stroke: rgba(255,255,255,0.3);
            stroke-width: 2px;
            stroke-dasharray: 4 4;
        }
        .checkpoint-label {
            fill: rgba(255,255,255,0.72);
            font-size: 9px;
            font-weight: bold;
        }

        /* Runner Dot */
        .runner-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6px;
            font-weight: bold;
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
            z-index: 10;
            transition: transform 0.15s linear, box-shadow 0.2s, top 0.1s linear, left 0.1s linear;
            border: 1.5px solid rgba(255,255,255,0.8);
        }

        .runner-dot.mentioned {
            box-shadow: 0 0 12px 4px #FBBF24, 0 0 20px 8px #F59E0B;
            animation: pulse-highlight 0.8s ease-in-out 2;
        }

        /* Leader positions */
        .runner-dot.position-1 {
            border: 3px solid #FFD700; /* Gold */
            box-shadow: 0 0 10px #FFD700, 0 2px 6px rgba(0,0,0,0.5);
        }
        .runner-dot.position-2 {
            border: 3px solid #C0C0C0; /* Silver */
            box-shadow: 0 0 8px #C0C0C0, 0 2px 6px rgba(0,0,0,0.5);
        }
        .runner-dot.position-3 {
            border: 3px solid #CD7F32; /* Bronze */
            box-shadow: 0 0 8px #CD7F32, 0 2px 6px rgba(0,0,0,0.5);
        }

        /* Position badge */
        .position-badge {
            position: absolute;
            top: -7px;
            right: -4px;
            background: #1E293B;
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 8px;
            padding: 0 2px;
            font-size: 4px;
            font-weight: bold;
            color: white;
            min-width: 8px;
            text-align: center;
            z-index: 15;
        }
        .position-badge.gold { background: #FFD700; color: #1E293B; }
        .position-badge.silver { background: #C0C0C0; color: #1E293B; }
        .position-badge.bronze { background: #CD7F32; color: white; }

        @keyframes pulse-highlight {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
        }

        /* Highlight Indicator */
        .focus-indicator {
            position: absolute;
            width: 24px;
            height: 24px;
            border: 2px solid #FACC15; /* Yellow */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s, top 0.1s linear, left 0.1s linear;
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.6);
        }
        .focus-indicator.active {
            opacity: 1;
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .runner-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 9px;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 1px 2px black;
            background-color: rgba(0,0,0,0.6);
            padding: 1px 4px;
            border-radius: 4px;
            pointer-events: none;
        }

        /* Panel Styling */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            /* Allow panel to just flow naturally */
        }

        .card {
            background-color: #1E293B;
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid #334155;
        }

        /* Scrollbar for Start List */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 3px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Lap Dots */
        .lap-dots {
            display: flex;
            gap: 4px;
            justify-content: center;
            margin-top: 4px;
        }
        .lap-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #334155;
            transition: background-color 0.3s;
        }
        .lap-dot.active {
            background-color: #3B82F6;
        }

        [data-state="pending"] {
            opacity: 0.5;
        }

        [data-state="reached"] {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto auto; /* Track then Panel */
                height: auto;
                overflow-y: auto;
            }
            .track-wrapper { height: 700px; min-height: 700px; padding-top: 10px; }
            .oval-track { transform: scale(1.12); margin-top: -10px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        <!-- LEFT: Track Visualization -->
        <div class="track-wrapper">
            <div class="oval-track" id="ovalTrack">
                <!-- Vertical Track SVG - 6 Lane Armory Blue -->
                <svg id="trackSvg" width="350" height="550" viewBox="0 0 350 550" class="absolute top-0 left-0">
                    <!-- Outer track - oval shape with straights and curves -->
                    <path d="M 25 175 L 25 375 A 150 150 0 1 0 325 375 L 325 175 A 150 150 0 1 0 25 175" fill="#1E3A8A" stroke="white" stroke-width="3"/>
                    
                    <!-- Lane lines (7 lines for 8 lanes) -->
                    <path d="M 40.625 175 L 40.625 375 A 134.375 134.375 0 1 0 309.375 375 L 309.375 175 A 134.375 134.375 0 1 0 40.625 175" class="lane-line" fill="none"/>
                    <path d="M 56.25 175 L 56.25 375 A 118.75 118.75 0 1 0 293.75 375 L 293.75 175 A 118.75 118.75 0 1 0 56.25 175" class="lane-line" fill="none"/>
                    <path d="M 71.875 175 L 71.875 375 A 103.125 103.125 0 1 0 278.125 375 L 278.125 175 A 103.125 103.125 0 1 0 71.875 175" class="lane-line" fill="none"/>
                    <path d="M 87.5 175 L 87.5 375 A 87.5 87.5 0 1 0 262.5 375 L 262.5 175 A 87.5 87.5 0 1 0 87.5 175" class="lane-line" fill="none"/>
                    <path d="M 103.125 175 L 103.125 375 A 71.875 71.875 0 1 0 246.875 375 L 246.875 175 A 71.875 71.875 0 1 0 103.125 175" class="lane-line" fill="none"/>
                    <path d="M 118.75 175 L 118.75 375 A 56.25 56.25 0 1 0 231.25 375 L 231.25 175 A 56.25 56.25 0 1 0 118.75 175" class="lane-line" fill="none"/>
                    <path d="M 134.375 175 L 134.375 375 A 40.625 40.625 0 1 0 215.625 375 L 215.625 175 A 40.625 40.625 0 1 0 134.375 175" class="lane-line" fill="none"/>

                    <!-- Inner infield -->
                    <path d="M 150 175 L 150 375 A 25 25 0 1 0 200 375 L 200 175 A 25 25 0 1 0 150 175" fill="#1E293B" stroke="white" stroke-width="2"/>

                    <!-- Shared start / finish line -->
                    <line x1="200" y1="175" x2="325" y2="175" class="start-finish-line" />
                    <text x="334" y="172" fill="white" font-size="9" font-weight="bold">STA</text>
                    <text x="334" y="184" fill="white" font-size="9" font-weight="bold">FIN</text>
                    <g id="checkpointMarkers"></g>
                </svg>

                <!-- Runners Layer -->
                <div id="runnersLayer" class="absolute top-0 left-0 w-full h-full">
                    <div id="focusIndicator" class="focus-indicator"></div>
                </div>
            </div>
        </div>

        <!-- RIGHT: Dashboard Panel -->
        <div class="control-panel">

            <!-- 1. Header & Timer -->
            <div class="card text-center relative overflow-hidden shrink-0">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 via-purple-500 to-pink-500"></div>
                <div class="flex justify-between items-center px-4 pt-4 pb-2">
                    <h1 class="text-lg font-bold text-gray-300" id="eventTitle">800m Heat Replay</h1>
                    <span class="text-[10px] bg-blue-900/50 px-2 py-0.5 rounded text-blue-300 border border-blue-800" id="trackBadge">200m Banked | 4 Laps</span>
                </div>
                <div class="text-5xl font-mono text-white tracking-widest mt-2" id="timer">0:00.00</div>
                <div class="text-xs text-gray-500 mb-2">Winning Time / <span class="text-gray-400" id="raceDuration">--:--</span></div>

                <!-- Lap Indicators -->
                <div class="flex flex-col items-center pb-2">
                    <div class="text-xs font-bold text-blue-400 uppercase tracking-wider" id="lapCounter">Lap 1 of 4</div>
                    <div class="lap-dots" id="lapDots">
                        <div class="lap-dot active"></div>
                        <div class="lap-dot"></div>
                        <div class="lap-dot"></div>
                        <div class="lap-dot"></div>
                    </div>
                </div>
            </div>

            <!-- 2. Race Recap (Commentary) -->
            <div class="card border-l-4 border-blue-500 bg-gray-800">
                <div class="flex justify-between items-center mb-2">
                    <div class="text-xs text-gray-400 uppercase font-bold">Race Recap</div>
                    <div class="text-xs text-green-400">● REPLAY</div>
                </div>
                <div id="commentaryBox" class="text-lg font-medium text-white italic leading-snug min-h-[80px] flex items-center">
                    Runners at the line...
                </div>
            </div>

            <!-- 3. Controls -->
            <div class="card">
                <div class="flex gap-2 justify-center mb-4">
                    <button onclick="toggleRace()" id="btnStart" class="bg-green-600 hover:bg-green-700 text-white w-full py-3 rounded font-bold transition flex items-center justify-center gap-2">
                        <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd" /></svg>
                        <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
                        <span id="btnText">START</span>
                    </button>
                    <button onclick="resetRace()" class="bg-gray-600 hover:bg-gray-700 text-white w-1/3 py-3 rounded font-bold transition">
                        Reset
                    </button>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-400 font-bold">Speed:</span>
                    <input type="range" id="speedSlider" aria-label="Playback Speed" min="1" max="4" step="0.5" value="1" class="flex-grow h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                    <span id="speedDisplay" class="text-xs font-mono text-blue-400 w-8">1x</span>
                </div>
            </div>

            <!-- 4. Stats / Legend -->
            <div class="card">
                <h3 class="text-xs text-gray-400 uppercase font-bold mb-3">Live Splits</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between items-center p-2 bg-gray-700/50 rounded border-l-2 border-blue-500">
                        <span class="text-gray-300" id="liveLeaderLabel">Winner</span>
                        <span class="font-mono font-bold text-blue-400" id="liveLeaderTime">--:--</span>
                    </div>
                    <div class="flex justify-between items-center p-2 bg-gray-700/50 rounded border-l-2 border-orange-500">
                        <span class="text-gray-300" id="focusRunnerLabel">Focus Runner</span>
                        <span class="font-mono font-bold text-orange-400" id="focusRunnerTime">--:--</span>
                    </div>
                    <div class="grid grid-cols-4 gap-1 mt-2 text-center text-xs text-gray-500">
                        <div data-state="pending">0-200<br><span class="text-white" id="split200">--</span></div>
                        <div data-state="pending">200-400<br><span class="text-white" id="split400">--</span></div>
                        <div data-state="pending">400-600<br><span class="text-white" id="split600">--</span></div>
                        <div data-state="pending">600-800<br><span class="text-white" id="split800">--</span></div>
                    </div>
                </div>
            </div>

            <!-- 5. Start List -->
            <div class="card flex-grow">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-xs text-gray-400 uppercase font-bold">Start List</h3>
                    <span class="text-[10px] text-gray-500"># = Hip/Bib</span>
                </div>
                <div class="space-y-2 text-xs overflow-y-auto max-h-40 pr-2 custom-scrollbar" id="startListContainer">
                    <!-- Populated by JS -->
                </div>
            </div>

        </div>
    </div>

<script type="module" src="js/app.js"></script>

</body>
</html>
